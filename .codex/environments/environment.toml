# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "praxisplaner"

[setup]
script = '''
set -eu

FNM_BIN="$(command -v fnm || true)"
ENV_NEXT="$(mktemp)"
trap 'rm -f "$ENV_NEXT"' EXIT

[ -n "$FNM_BIN" ] || { echo "Missing fnm on PATH"; exit 1; }

if [ -f .env.local ]; then
  set -a
  . ./.env.local
  set +a
fi

[ -n "${CONVEX_IMPORT_DEPLOYMENT:-}" ] || { echo "Missing CONVEX_IMPORT_DEPLOYMENT in .env.local"; exit 1; }
[ -n "${CONVEX_SELECTED_DEPLOYMENT:-}" ] || { echo "Missing CONVEX_SELECTED_DEPLOYMENT in .env.local"; exit 1; }
[ -n "${CONVEX_CLOUD_URL:-}" ] || { echo "Missing CONVEX_CLOUD_URL in .env.local"; exit 1; }
[ -n "${CONVEX_SITE_URL:-}" ] || { echo "Missing CONVEX_SITE_URL in .env.local"; exit 1; }

SOURCE_CONVEX_DEPLOYMENT="${CONVEX_DEPLOYMENT:-}"
SOURCE_CONVEX_FROM_ENV=0
if [ -n "$SOURCE_CONVEX_DEPLOYMENT" ]; then
  SOURCE_CONVEX_FROM_ENV=1
fi
SOURCE_CONVEX_COMMENT=""
if [ -z "$SOURCE_CONVEX_DEPLOYMENT" ] && [ -f .env.local ]; then
  EXISTING_CONVEX_LINE="$(sed -n 's/^CONVEX_DEPLOYMENT=//p' .env.local | head -n 1)"
  SOURCE_CONVEX_DEPLOYMENT="$(printf '%s' "$EXISTING_CONVEX_LINE" | sed -E 's/[[:space:]]*#.*$//')"
  SOURCE_CONVEX_COMMENT="$(printf '%s' "$EXISTING_CONVEX_LINE" | sed -n -E 's/^[^#]*(#.*)$/ \1/p')"
fi

if [ "$SOURCE_CONVEX_FROM_ENV" -eq 0 ]; then
  CONVEX_TEAM_SLUG="${CONVEX_TEAM_SLUG:-}"
  CONVEX_PROJECT_SLUG="${CONVEX_PROJECT_SLUG:-}"
  CONVEX_TEAM_SLUG="${CONVEX_TEAM_SLUG:-$(printf '%s' "$SOURCE_CONVEX_COMMENT" | sed -n -E 's/.*team: ([^, ]+).*/\1/p')}"
  CONVEX_PROJECT_SLUG="${CONVEX_PROJECT_SLUG:-$(printf '%s' "$SOURCE_CONVEX_COMMENT" | sed -n -E 's/.*project: ([^, ]+).*/\1/p')}"
  if [ -z "$SOURCE_CONVEX_DEPLOYMENT" ] && [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
    CONVEX_TEAM_SLUG="${CONVEX_TEAM_SLUG:-jb-5af98}"
    CONVEX_PROJECT_SLUG="${CONVEX_PROJECT_SLUG:-praxisplaner}"
  fi
else
  CONVEX_TEAM_SLUG=""
  CONVEX_PROJECT_SLUG=""
fi

if [ -z "$SOURCE_CONVEX_DEPLOYMENT" ] && [ -z "${CONVEX_DEPLOY_KEY:-}" ] && { [ -z "$CONVEX_TEAM_SLUG" ] || [ -z "$CONVEX_PROJECT_SLUG" ]; }; then
  echo "Missing CONVEX_DEPLOYMENT in .env.local or environment, or CONVEX_TEAM_SLUG/CONVEX_PROJECT_SLUG defaults"
  exit 1
fi

eval "$("$FNM_BIN" env --shell bash)"
"$FNM_BIN" use --install-if-missing --silent-if-unchanged
corepack enable

WORKTREE_NAME="$(basename "$(pwd)")"
BRANCH_NAME="$(git branch --show-current 2>/dev/null || true)"
RAW_PREVIEW_NAME="${BRANCH_NAME:-$WORKTREE_NAME}"
PREVIEW_SLUG="$(
  printf '%s' "$RAW_PREVIEW_NAME" |
    tr '[:upper:]' '[:lower:]' |
    sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//'
)"
PREVIEW_HASH="$(printf '%s' "$(pwd)" | shasum -a 256 | cut -c1-8)"
PREVIEW_SLUG="${PREVIEW_SLUG:-worktree}"
PREVIEW_SLUG="$(printf '%s' "$PREVIEW_SLUG" | cut -c1-48 | sed -E 's/-+$//')"
PREVIEW_SLUG="${PREVIEW_SLUG:-worktree}"
PREVIEW_NAME="codex-${PREVIEW_SLUG}-${PREVIEW_HASH}"

POSTHOG_HOST="${VITE_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}"

if [ -f .env.local ]; then
  sed -E '/^(AUTH_BYPASS_ENABLED|AUTH_BYPASS_SUBJECT|AUTH_BYPASS_EMAIL|VITE_AUTH_BYPASS_ENABLED|VITE_VERCEL_ENV|WORKOS_CLIENT_ID|VITE_WORKOS_CLIENT_ID|VITE_PUBLIC_POSTHOG_HOST|CONVEX_DEPLOYMENT|VITE_CONVEX_URL|VITE_CONVEX_SITE_URL)=/d' .env.local > "$ENV_NEXT"
else
  : > "$ENV_NEXT"
fi

if [ -n "${VITE_PUBLIC_POSTHOG_KEY:-}" ]; then
  sed -E '/^VITE_PUBLIC_POSTHOG_KEY=/d' "$ENV_NEXT" > "$ENV_NEXT.posthog"
  mv "$ENV_NEXT.posthog" "$ENV_NEXT"
fi

{
  printf 'AUTH_BYPASS_ENABLED=true\n'
  printf 'VITE_AUTH_BYPASS_ENABLED=true\n'
  printf 'VITE_VERCEL_ENV=preview\n'
  printf 'VITE_PUBLIC_POSTHOG_HOST=%s\n' "$POSTHOG_HOST"
  if [ -n "${VITE_PUBLIC_POSTHOG_KEY:-}" ]; then
    printf 'VITE_PUBLIC_POSTHOG_KEY=%s\n' "$VITE_PUBLIC_POSTHOG_KEY"
  fi
  printf '\n# Deployment used by `npx convex dev`\n'
  printf 'CONVEX_DEPLOYMENT=%s # team: jb-5af98, project: praxisplaner\n' "$CONVEX_SELECTED_DEPLOYMENT"
  printf '\nVITE_CONVEX_URL=%s\n' "$CONVEX_CLOUD_URL"
  printf '\nVITE_CONVEX_SITE_URL=%s\n' "$CONVEX_SITE_URL"
} >> "$ENV_NEXT"
mv "$ENV_NEXT" .env.local
chmod 600 .env.local

pnpm i
pnpm seed:preview
pnpm exec convex env set AUTH_BYPASS_ENABLED true --deployment "$CONVEX_IMPORT_DEPLOYMENT"
AUTH_BYPASS_ENABLED=true pnpm exec convex deploy --env-file .env.local --yes
pnpm exec convex env set --deployment "$CONVEX_IMPORT_DEPLOYMENT" --from-file .env.local --force
pnpm exec convex import --deployment "$CONVEX_IMPORT_DEPLOYMENT" --replace-all --yes .cache/seed/preview.zip
pnpm exec convex run devAuth:ensurePreviewAuthPersonas --deployment "$CONVEX_IMPORT_DEPLOYMENT"
pnpm gen
'''

[[actions]]
name = "Verify CI checks don't fail."
icon = "tool"
command = '''
set -eu

FNM_BIN="$(command -v fnm || true)"
[ -n "$FNM_BIN" ] || { echo "Missing fnm on PATH"; exit 1; }

eval "$("$FNM_BIN" env --shell bash)"
"$FNM_BIN" use --install-if-missing --silent-if-unchanged
corepack enable

pnpm gen
pnpm lint
pnpm tsc
pnpm format
pnpm test
pnpm build
'''

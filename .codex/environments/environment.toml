# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "praxisplaner"

[setup]
script = '''
set -eu

FNM_BIN="$(command -v fnm || true)"
ENV_NEXT="$(mktemp)"
trap 'rm -f "$ENV_NEXT"' EXIT

[ -n "$FNM_BIN" ] || { echo "Missing fnm on PATH"; exit 1; }

read_local_env_value() {
  name="$1"
  [ -f .env.local ] || return 0
  value="$(sed -n "s/^${name}=//p" .env.local | head -n 1 | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
  case "$value" in
    \"*\")
      value="$(printf '%s' "$value" | sed -E 's/^"//; s/"[[:space:]]*(#.*)?$//')"
      ;;
    \'*\')
      value="$(printf '%s' "$value" | sed -E "s/^'//; s/'[[:space:]]*(#.*)?$//")"
      ;;
    *)
      value="$(printf '%s' "$value" | sed -E 's/[[:space:]]*#.*$//')"
      ;;
  esac
  printf '%s' "$value"
}

SOURCE_CONVEX_DEPLOYMENT="${CONVEX_DEPLOYMENT:-}"
SOURCE_CONVEX_FROM_ENV=0
if [ -n "$SOURCE_CONVEX_DEPLOYMENT" ]; then
  SOURCE_CONVEX_FROM_ENV=1
fi
ENV_FILE_CONVEX_TEAM_SLUG=""
ENV_FILE_CONVEX_PROJECT_SLUG=""
ENV_FILE_CONVEX_DEPLOY_KEY=""
if [ -z "$SOURCE_CONVEX_DEPLOYMENT" ] && [ -f .env.local ]; then
  SOURCE_CONVEX_DEPLOYMENT="$(read_local_env_value CONVEX_DEPLOYMENT)"
fi
if [ -f .env.local ]; then
  ENV_FILE_CONVEX_TEAM_SLUG="$(read_local_env_value CONVEX_TEAM_SLUG)"
  ENV_FILE_CONVEX_PROJECT_SLUG="$(read_local_env_value CONVEX_PROJECT_SLUG)"
  ENV_FILE_CONVEX_DEPLOY_KEY="$(read_local_env_value CONVEX_DEPLOY_KEY)"
fi
CONVEX_DEPLOY_KEY="${CONVEX_DEPLOY_KEY:-$ENV_FILE_CONVEX_DEPLOY_KEY}"
if [ -n "$CONVEX_DEPLOY_KEY" ]; then
  export CONVEX_DEPLOY_KEY
fi

if [ "$SOURCE_CONVEX_FROM_ENV" -eq 0 ]; then
  CONVEX_TEAM_SLUG="${CONVEX_TEAM_SLUG:-$ENV_FILE_CONVEX_TEAM_SLUG}"
  CONVEX_PROJECT_SLUG="${CONVEX_PROJECT_SLUG:-$ENV_FILE_CONVEX_PROJECT_SLUG}"
else
  CONVEX_TEAM_SLUG=""
  CONVEX_PROJECT_SLUG=""
fi

if [ -z "$SOURCE_CONVEX_DEPLOYMENT" ] && [ -z "${CONVEX_DEPLOY_KEY:-}" ] && { [ -z "$CONVEX_TEAM_SLUG" ] || [ -z "$CONVEX_PROJECT_SLUG" ]; }; then
  MISSING_CONVEX_BOOTSTRAP=1
else
  MISSING_CONVEX_BOOTSTRAP=0
fi

eval "$("$FNM_BIN" env --shell bash)"
"$FNM_BIN" use --install-if-missing --silent-if-unchanged
corepack enable

WORKTREE_NAME="$(basename "$(pwd)")"
BRANCH_NAME="$(git branch --show-current 2>/dev/null || true)"
RAW_PREVIEW_NAME="${BRANCH_NAME:-$WORKTREE_NAME}"
PREVIEW_SLUG="$(
  printf '%s' "$RAW_PREVIEW_NAME" |
    tr '[:upper:]' '[:lower:]' |
    sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//'
)"
PREVIEW_HASH="$(printf '%s' "$(pwd)" | shasum -a 256 | cut -c1-8)"
PREVIEW_SLUG="${PREVIEW_SLUG:-worktree}"
PREVIEW_SLUG="$(printf '%s' "$PREVIEW_SLUG" | cut -c1-48 | sed -E 's/-+$//')"
PREVIEW_SLUG="${PREVIEW_SLUG:-worktree}"
PREVIEW_NAME="codex-${PREVIEW_SLUG}-${PREVIEW_HASH}"

POSTHOG_HOST="${VITE_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}"

if [ -f .env.local ]; then
  sed -E '/^(AUTH_BYPASS_ENABLED|AUTH_BYPASS_SUBJECT|AUTH_BYPASS_EMAIL|VITE_AUTH_BYPASS_ENABLED|VITE_VERCEL_ENV|WORKOS_CLIENT_ID|VITE_WORKOS_CLIENT_ID|VITE_PUBLIC_POSTHOG_HOST|CONVEX_DEPLOYMENT|VITE_CONVEX_URL|VITE_CONVEX_SITE_URL|CONVEX_URL|CONVEX_IMPORT_DEPLOYMENT|CONVEX_SELECTED_DEPLOYMENT|CONVEX_CLOUD_URL|CONVEX_SITE_URL)=/d' .env.local > "$ENV_NEXT"
else
  : > "$ENV_NEXT"
fi

if [ -n "${VITE_PUBLIC_POSTHOG_KEY:-}" ]; then
  sed -E '/^VITE_PUBLIC_POSTHOG_KEY=/d' "$ENV_NEXT" > "$ENV_NEXT.posthog"
  mv "$ENV_NEXT.posthog" "$ENV_NEXT"
fi

{
  printf 'AUTH_BYPASS_ENABLED=true\n'
  printf 'VITE_AUTH_BYPASS_ENABLED=true\n'
  printf 'VITE_VERCEL_ENV=preview\n'
  printf 'VITE_PUBLIC_POSTHOG_HOST=%s\n' "$POSTHOG_HOST"
  if [ -n "${VITE_PUBLIC_POSTHOG_KEY:-}" ]; then
    printf 'VITE_PUBLIC_POSTHOG_KEY=%s\n' "$VITE_PUBLIC_POSTHOG_KEY"
  fi
} >> "$ENV_NEXT"
mv "$ENV_NEXT" .env.local
chmod 600 .env.local

pnpm i
if [ "$MISSING_CONVEX_BOOTSTRAP" -eq 1 ]; then
  cat >&2 <<'EOF'
Missing Convex setup values.

Create .env.local with either:
  CONVEX_TEAM_SLUG=...
  CONVEX_PROJECT_SLUG=...

or an existing preview/dev source:
  CONVEX_DEPLOYMENT=...

Then rerun setup.
EOF
  exit 1
fi
pnpm seed:preview
CONVEX_PREVIEW_REF="$PREVIEW_NAME"
if [ -n "$CONVEX_TEAM_SLUG" ] && [ -n "$CONVEX_PROJECT_SLUG" ]; then
  CONVEX_PREVIEW_REF="${CONVEX_TEAM_SLUG}:${CONVEX_PROJECT_SLUG}:${PREVIEW_NAME}"
fi
if [ -n "$SOURCE_CONVEX_DEPLOYMENT" ]; then
  CONVEX_DEPLOYMENT="$SOURCE_CONVEX_DEPLOYMENT" pnpm exec convex deployment create "$CONVEX_PREVIEW_REF" --type preview --select --expiration "in 5 days" ||
    CONVEX_DEPLOYMENT="$SOURCE_CONVEX_DEPLOYMENT" pnpm exec convex deployment select "$CONVEX_PREVIEW_REF"
else
  pnpm exec convex deployment create "$CONVEX_PREVIEW_REF" --type preview --select --expiration "in 5 days" ||
    pnpm exec convex deployment select "$CONVEX_PREVIEW_REF"
fi
CONVEX_SELECTED_DEPLOYMENT="$(read_local_env_value CONVEX_DEPLOYMENT)"
case "$CONVEX_SELECTED_DEPLOYMENT" in
  preview:*) ;;
  *)
    echo "Expected preview CONVEX_DEPLOYMENT after selecting $CONVEX_PREVIEW_REF, got ${CONVEX_SELECTED_DEPLOYMENT:-<missing>}"
    exit 1
    ;;
esac
CONVEX_IMPORT_DEPLOYMENT="$(printf '%s' "$CONVEX_SELECTED_DEPLOYMENT" | sed -n 's/^preview:\([^ #]*\).*/\1/p')"
[ -n "$CONVEX_IMPORT_DEPLOYMENT" ] || { echo "Missing preview CONVEX_DEPLOYMENT in .env.local"; exit 1; }
if [ "$CONVEX_SELECTED_DEPLOYMENT" != "preview:$CONVEX_IMPORT_DEPLOYMENT" ]; then
  echo "Refusing destructive import: CONVEX_SELECTED_DEPLOYMENT does not match CONVEX_IMPORT_DEPLOYMENT"
  exit 1
fi
case "$CONVEX_IMPORT_DEPLOYMENT" in
  *[!a-zA-Z0-9-]* | "")
    echo "Refusing destructive import: target is not an explicit preview deployment: ${CONVEX_IMPORT_DEPLOYMENT:-<missing>}"
    exit 1
    ;;
esac
CONVEX_CLOUD_URL="https://$CONVEX_IMPORT_DEPLOYMENT.convex.cloud"
CONVEX_SITE_URL="https://$CONVEX_IMPORT_DEPLOYMENT.convex.site"
sed -E '/^(CONVEX_DEPLOYMENT|VITE_CONVEX_URL|VITE_CONVEX_SITE_URL|CONVEX_URL)=/d' .env.local > "$ENV_NEXT"
{
  printf 'CONVEX_DEPLOYMENT=%s\n' "$CONVEX_SELECTED_DEPLOYMENT"
  printf 'VITE_CONVEX_URL=%s\n' "$CONVEX_CLOUD_URL"
  printf 'VITE_CONVEX_SITE_URL=%s\n' "$CONVEX_SITE_URL"
  printf 'CONVEX_URL=%s\n' "$CONVEX_CLOUD_URL"
} >> "$ENV_NEXT"
mv "$ENV_NEXT" .env.local
chmod 600 .env.local
pnpm exec convex env set AUTH_BYPASS_ENABLED true --deployment "$CONVEX_IMPORT_DEPLOYMENT"
AUTH_BYPASS_ENABLED=true pnpm exec convex deploy --preview-name "$PREVIEW_NAME" --env-file .env.local --yes
CONVEX_RUNTIME_ENV_FILE="$(mktemp)"
sed -E '/^(CONVEX_DEPLOY_KEY|CONVEX_IMPORT_DEPLOYMENT|CONVEX_SELECTED_DEPLOYMENT|CONVEX_CLOUD_URL|CONVEX_SITE_URL)=/d' .env.local > "$CONVEX_RUNTIME_ENV_FILE"
pnpm exec convex env set --deployment "$CONVEX_IMPORT_DEPLOYMENT" --from-file "$CONVEX_RUNTIME_ENV_FILE" --force
rm -f "$CONVEX_RUNTIME_ENV_FILE"
printf 'Running destructive preview seed import against Convex deployment: %s\n' "$CONVEX_IMPORT_DEPLOYMENT"
pnpm exec convex import --deployment "$CONVEX_IMPORT_DEPLOYMENT" --replace-all --yes .cache/seed/preview.zip
pnpm exec convex run devAuth:ensurePreviewAuthPersonas --deployment "$CONVEX_IMPORT_DEPLOYMENT"
sed -E '/^CONVEX_DEPLOY_KEY=/d' .env.local > "$ENV_NEXT"
mv "$ENV_NEXT" .env.local
chmod 600 .env.local
env -u CONVEX_DEPLOY_KEY pnpm gen
'''

[[actions]]
name = "Verify CI checks don't fail."
icon = "tool"
command = '''
set -eu

FNM_BIN="$(command -v fnm || true)"
[ -n "$FNM_BIN" ] || { echo "Missing fnm on PATH"; exit 1; }

eval "$("$FNM_BIN" env --shell bash)"
"$FNM_BIN" use --install-if-missing --silent-if-unchanged
corepack enable

pnpm gen
pnpm lint
pnpm tsc
pnpm format
pnpm test
pnpm build
'''

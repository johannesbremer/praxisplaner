# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "praxisplaner"

[setup]
script = '''
set -eu

FNM_BIN="$(command -v fnm || true)"

[ -n "$FNM_BIN" ] || { echo "Missing fnm on PATH"; exit 1; }

if [ -z "${WORKOS_CLIENT_ID:-}" ] && [ -z "${VITE_WORKOS_CLIENT_ID:-}" ]; then
  echo "Missing WORKOS_CLIENT_ID or VITE_WORKOS_CLIENT_ID"
  exit 1
fi

eval "$("$FNM_BIN" env --shell bash)"
"$FNM_BIN" use --install-if-missing --silent-if-unchanged
corepack enable

WORKTREE_NAME="$(basename "$(pwd)")"
BRANCH_NAME="$(git branch --show-current 2>/dev/null || true)"
RAW_PREVIEW_NAME="${BRANCH_NAME:-$WORKTREE_NAME}"
PREVIEW_SLUG="$(
  printf '%s' "$RAW_PREVIEW_NAME" |
    tr '[:upper:]' '[:lower:]' |
    sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//'
)"
PREVIEW_HASH="$(printf '%s' "$(pwd)" | shasum -a 256 | cut -c1-8)"
PREVIEW_SLUG="${PREVIEW_SLUG:-worktree}"
PREVIEW_SLUG="$(printf '%s' "$PREVIEW_SLUG" | cut -c1-48 | sed -E 's/-+$//')"
PREVIEW_SLUG="${PREVIEW_SLUG:-worktree}"
PREVIEW_NAME="codex-${PREVIEW_SLUG}-${PREVIEW_HASH}"

WORKOS_ID="${WORKOS_CLIENT_ID:-${VITE_WORKOS_CLIENT_ID:-}}"
POSTHOG_HOST="${VITE_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}"

{
  printf 'WORKOS_CLIENT_ID=%s\n' "$WORKOS_ID"
  printf 'VITE_WORKOS_CLIENT_ID=%s\n' "$WORKOS_ID"
  printf 'VITE_PUBLIC_POSTHOG_HOST=%s\n' "$POSTHOG_HOST"
  if [ -n "${VITE_PUBLIC_POSTHOG_KEY:-}" ]; then
    printf 'VITE_PUBLIC_POSTHOG_KEY=%s\n' "$VITE_PUBLIC_POSTHOG_KEY"
  fi
} > .env.local
chmod 600 .env.local

pnpm i
pnpm seed:preview
pnpm exec convex deployment create "$PREVIEW_NAME" --type preview --select --expiration "in 5 days" ||
  pnpm exec convex deployment select "$PREVIEW_NAME"
pnpm exec convex deploy --preview-name "$PREVIEW_NAME" --env-file .env.local --yes
CONVEX_IMPORT_DEPLOYMENT="$(sed -n 's/^CONVEX_DEPLOYMENT=preview:\([^ #]*\).*/\1/p' .env.local)"
[ -n "$CONVEX_IMPORT_DEPLOYMENT" ] || { echo "Missing preview CONVEX_DEPLOYMENT in .env.local"; exit 1; }
pnpm exec convex import --deployment "$CONVEX_IMPORT_DEPLOYMENT" --replace-all --yes seed_data.zip
pnpm gen
'''

[[actions]]
name = "Verify CI checks don't fail."
icon = "tool"
command = '''
set -eu

FNM_BIN="$(command -v fnm || true)"
[ -n "$FNM_BIN" ] || { echo "Missing fnm on PATH"; exit 1; }

eval "$("$FNM_BIN" env --shell bash)"
"$FNM_BIN" use --install-if-missing --silent-if-unchanged
corepack enable

pnpm gen
pnpm lint
pnpm tsc
pnpm format
pnpm test
pnpm build
'''
